version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ai_fetcher_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/.env:/app/.env
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  frontend:
    build: 
      context: ./frontend
    container_name: ai_fetcher_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

  # [LOCAL DEV ONLY] Automatically exposes the frontend to the internet via Ngrok
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ai_fetcher_ngrok
    restart: always
    environment:
      - NGROK_AUTHTOKEN=38xwH9Y6WmQPNPDNHH0odJoOkdw_2BGDwbYZ3C1aQhGNcfmqK
    command:
      - "http"
      - "frontend:80"
    depends_on:
      - frontend
